<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<!-- This page lives in prototype/ but its relative URLs (js/, data/, css/) are
     resolved from the project root, so the shared Atlas data layer keeps working. -->
<base href="../" />
<title>Layer-Set Prototype · Atlas design</title>
<!-- Reuses the ORIGINAL dashboard's look (css/styles.css: theme, topbar, side-nav,
     map-control panel) and drops the layer-set mechanism into the map panel. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,400&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet" />
<link href="css/styles.css" rel="stylesheet" />
<link href="prototype/prototype2.css" rel="stylesheet" />
</head>
<body>
<section class="dashboard" id="dashboard">

  <header class="topbar">
    <div class="brand"><span class="brand-mark">✧</span><span class="brand-name">SEOUL DATA ATLAS</span></div>
    <div class="topbar-breadcrumb"><span class="crumb">Map</span><span class="sep">›</span><span class="crumb current">Layer Sets</span></div>
    <div class="topbar-right"><span class="proto-tag">design prototype</span></div>
  </header>

  <div class="dash-body">
    <nav class="side-nav">
      <button class="nav-item"><span class="nav-icon">◱</span><span class="nav-label"><b>Overview</b></span></button>
      <button class="nav-item"><span class="nav-icon">▤</span><span class="nav-label"><b>Library</b></span></button>
      <button class="nav-item active"><span class="nav-icon">▦</span><span class="nav-label"><b>Map</b></span></button>
      <button class="nav-item"><span class="nav-icon">◈</span><span class="nav-label"><b>Saved</b></span></button>
      <div class="nav-spacer"></div>
      <button class="nav-item"><span class="nav-icon">⚙</span><span class="nav-label"><b>Settings</b></span></button>
    </nav>

    <section class="atlas-canvas panel-cell">
      <div class="map-stage" id="map-stage">
        <div id="pmap"></div>

        <!-- layer-set panel, styled like the original map-control flyout -->
        <aside class="map-control ls-panel" id="ls-panel">
          <div class="panel-head"><div class="panel-name">LAYER SET</div><div class="panel-state">EDIT</div></div>
          <div id="setbar"></div>
          <div id="cards"></div>
        </aside>

        <div id="legend"></div>
      </div>
    </section>
  </div>
</section>

<script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/deck.gl@9/dist.min.js"></script>
<script>window.__cb = Date.now();
  ["js/data.js", "js/prototype/model.js", "js/prototype/seed-sales.js", "js/prototype/preview.js", "js/prototype/panel.js"]
    .forEach(function (s) { document.write('<script src="' + s + '?v=' + window.__cb + '"><\/script>'); });
</script>
<script>window.addEventListener("load", function () { bootPrototype().catch(function (e) { document.getElementById("cards").innerHTML = '<div style="color:#8c93a3;padding:16px">Boot error: ' + e.message + '</div>'; console.error(e); }); });</script>
</body>
</html>
